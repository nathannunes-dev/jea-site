<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&A - Página Inicial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="img/logo-simples.png" alt="Logo J&A" height="50px" class="d-inline-block align-text-top" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item border-end">
                        <a class="nav-link px-3" href="#">Home</a>
                    </li>

                    <li class="nav-item border-end">
                        <a class="nav-link px-3" href="#">Produtos</a>
                    </li>

                    <li class="nav-item border-end">
                        <a class="nav-link px-3" href="#">Contato</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link ps-3" href="#">Quem Somos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Fim da Navbar -->

    <!-- Inicio Hero Banner -->
    <section class="py-5 border-bottom">
        <div class="container">
            <div class="row align-items-center g-5">
        
                <!-- Texto -->
                <div class="col-lg-6 text-center text-lg-start">
        
                    <h1 class="display-4 fw-bold text-body-emphasis">
                        Bobinas e Etiquetas Térmicas com Envio Rápido
                    </h1>
        
                    <p class="lead my-4">
                        Atendemos empresas, comércios, mercados e empreendedores
                        com produtos de qualidade e excelente custo-benefício.
                    </p>
        
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center justify-content-lg-start">
        
                        <button type="button" class="btn btn-success btn-lg">
                            <i class="bi bi-whatsapp me-1"></i>
                            Solicitar Cotação
                        </button>
        
                        <button type="button" class="btn btn-outline-dark btn-lg">
                            <i class="bi bi-cart me-1"></i>
                            Mercado Livre
                        </button>
        
                        <button type="button" class="btn btn-outline-dark btn-lg">
                            <i class="bi bi-cart me-1"></i>
                            Shopee
                        </button>
        
                    </div>
        
                </div>
        
                <!-- Imagem -->
                <div class="col-lg-6">
                    <img src="img/banner_inicio.png" class="img-fluid rounded-3" alt="Bobinas e Etiquetas Térmicas" loading="lazy">
                </div>
        
            </div>
        </div>
    </section>
    <!-- Fim Hero Banner -->
        
    
</body>
</html>
